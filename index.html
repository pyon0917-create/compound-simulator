<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>複利シミュレーター</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f2f2f7;
      --card-bg: #ffffff;
      --text: #1c1c1e;
      --text-secondary: #6e6e73;
      --accent-blue: #007aff;
      --accent-green: #34c759;
      --accent-gray: #8e8e93;
      --accent-orange: #ff9500;
      --border: #e5e5ea;
      --slider-track: #e5e5ea;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card-bg: #2c2c2e;
        --text: #ffffff;
        --text-secondary: #98989f;
        --border: #38383a;
        --slider-track: #38383a;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ヘッダー */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    .share-btn {
      background: none;
      border: none;
      color: var(--accent-blue);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    /* サマリーカード */
    .summary-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-label {
      font-size: 10px;
      color: var(--text-secondary);
      line-height: 1.3;
    }
    .card-value {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .card-value.blue { color: var(--accent-blue); }
    .card-value.default { color: var(--text); }

    /* スライダー */
    .sliders {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-label {
      font-size: 11px;
      color: var(--text-secondary);
      width: 52px;
      flex-shrink: 0;
    }
    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(
        to right,
        var(--accent-blue) 0%,
        var(--accent-blue) var(--pct, 50%),
        var(--slider-track) var(--pct, 50%),
        var(--slider-track) 100%
      );
      outline: none;
      cursor: pointer;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
    }
    .slider-row input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
      border: none;
    }
    .slider-value {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      width: 68px;
      text-align: right;
      flex-shrink: 0;
    }

    /* グラフ */
    .chart-wrap {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 14px;
    }
    .chart-canvas-wrap {
      position: relative;
      height: 200px;
    }

    /* 凡例 */
    .legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 6px 0 2px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 10px;
      height: 8px;
      border-radius: 2px;
    }

    /* 72の法則バー */
    .rule72 {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .rule72-icon { color: var(--accent-orange); font-size: 16px; }
    .rule72-label { color: var(--text-secondary); }
    .rule72-value { font-weight: 600; color: var(--text); }

    /* トースト（シェア通知） */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(50,50,50,0.92);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="container">
  <!-- ヘッダー -->
  <div class="header">
    <h1>複利シミュレーター</h1>
    <button class="share-btn" onclick="shareResult()" title="シェア">⬆</button>
  </div>

  <!-- サマリーカード -->
  <div class="summary-cards">
    <div class="card">
      <div class="card-label">最終資産</div>
      <div class="card-value blue" id="card-final">—</div>
    </div>
    <div class="card">
      <div class="card-label">総投資額</div>
      <div class="card-value default" id="card-invest">—</div>
    </div>
    <div class="card">
      <div class="card-label">うち利息</div>
      <div class="card-value blue" id="card-interest">—</div>
    </div>
  </div>

  <!-- スライダー -->
  <div class="sliders">
    <div class="slider-row">
      <span class="slider-label">初期元本</span>
      <input type="range" id="sl-principal" min="0" max="50000000" step="500000" value="5000000" oninput="onSlider()">
      <span class="slider-value" id="lbl-principal"></span>
    </div>
    <div class="slider-row">
      <span class="slider-label">毎月積立</span>
      <input type="range" id="sl-monthly" min="0" max="500000" step="10000" value="50000" oninput="onSlider()">
      <span class="slider-value" id="lbl-monthly"></span>
    </div>
    <div class="slider-row">
      <span class="slider-label">年利</span>
      <input type="range" id="sl-rate" min="1" max="15" step="1" value="5" oninput="onSlider()">
      <span class="slider-value" id="lbl-rate"></span>
    </div>
    <div class="slider-row">
      <span class="slider-label">運用年数</span>
      <input type="range" id="sl-years" min="5" max="40" step="5" value="20" oninput="onSlider()">
      <span class="slider-value" id="lbl-years"></span>
    </div>
  </div>

  <!-- グラフ -->
  <div class="chart-wrap">
    <div class="chart-canvas-wrap">
      <canvas id="chart"></canvas>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#8e8e93"></div>元本
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#34c759"></div>積立
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#007aff"></div>利息
      </div>
    </div>
  </div>

  <!-- 72の法則 -->
  <div class="rule72">
    <span class="rule72-icon">⊗</span>
    <span class="rule72-label">72の法則：</span>
    <span class="rule72-value" id="rule72-text">—</span>
  </div>
</div>

<div class="toast" id="toast">クリップボードにコピーしました</div>

<script>
// ── 数値フォーマット ──────────────────────────
function fmt(yen) {
  if (yen >= 1e8) return (yen / 1e8).toFixed(1) + '億円';
  if (yen >= 1e4) {
    const man = yen / 1e4;
    return (man >= 100 ? man.toFixed(0) : man.toFixed(1)) + '万円';
  }
  return Math.round(yen).toLocaleString() + '円';
}
function fmtAxis(yen) {
  if (yen >= 1e8) return (yen / 1e8).toFixed(1) + '億';
  return (yen / 1e4).toFixed(0) + '万';
}

// ── 計算ロジック ──────────────────────────────
function calcSnapshots(P, M, ratePercent, years) {
  const r = ratePercent / 100;
  const mr = r / 12;
  const snaps = [];
  const step = years <= 10 ? 5 : 5;

  for (let y = 0; y <= years; y++) {
    if (y !== 0 && y !== years && y % step !== 0) continue;
    const months = y * 12;
    const cf = mr === 0 ? 1 : Math.pow(1 + mr, months);
    const grownP = P * cf;
    const grownC = mr === 0 ? M * months : M * (cf - 1) / mr;
    const total = grownP + grownC;
    const invested = P + M * months;
    const interest = Math.max(0, total - invested);
    const pureContrib = M * months;
    snaps.push({ year: y, principal: P, contribution: pureContrib, interest });
  }
  return snaps;
}

// ── Chart.js 初期化 ───────────────────────────
const ctx = document.getElementById('chart').getContext('2d');
const myChart = new Chart(ctx, {
  type: 'bar',
  data: { labels: [], datasets: [
    { label: '元本',   data: [], backgroundColor: '#8e8e93', stack: 'a' },
    { label: '積立',   data: [], backgroundColor: '#34c759', stack: 'a' },
    { label: '利息',   data: [], backgroundColor: '#007aff', stack: 'a' },
  ]},
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 200 },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}：${fmt(ctx.parsed.y * 1e4)}`,
          title: items => `${items[0].label}時点`,
        }
      }
    },
    scales: {
      x: {
        stacked: true,
        grid: { display: false },
        ticks: { font: { size: 10 }, color: '#8e8e93' },
      },
      y: {
        stacked: true,
        beginAtZero: true,
        ticks: {
          font: { size: 10 },
          color: '#8e8e93',
          callback: v => fmtAxis(v * 1e4),
        },
        grid: { color: 'rgba(128,128,128,0.15)' },
      }
    }
  }
});

// ── スライダー更新トラッキング ─────────────────
function updateSliderTrack(el) {
  const min = +el.min, max = +el.max, val = +el.value;
  const pct = ((val - min) / (max - min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

// ── メイン更新関数 ────────────────────────────
function onSlider() {
  const P     = +document.getElementById('sl-principal').value;
  const M     = +document.getElementById('sl-monthly').value;
  const rate  = +document.getElementById('sl-rate').value;
  const years = +document.getElementById('sl-years').value;

  // スライダートラック更新
  ['sl-principal','sl-monthly','sl-rate','sl-years'].forEach(id => {
    updateSliderTrack(document.getElementById(id));
  });

  // ラベル更新
  document.getElementById('lbl-principal').textContent = fmt(P);
  document.getElementById('lbl-monthly').textContent   = fmt(M);
  document.getElementById('lbl-rate').textContent      = rate + '%';
  document.getElementById('lbl-years').textContent     = years + '年';

  // 計算
  const snaps = calcSnapshots(P, M, rate, years);
  const last  = snaps[snaps.length - 1];
  const finalAsset    = last.principal + last.contribution + last.interest;
  const totalInvested = P + M * years * 12;
  const totalInterest = Math.max(0, finalAsset - totalInvested);

  // サマリーカード
  document.getElementById('card-final').textContent    = fmt(finalAsset);
  document.getElementById('card-invest').textContent   = fmt(totalInvested);
  document.getElementById('card-interest').textContent = fmt(totalInterest);

  // 72の法則
  const dy = rate > 0 ? (72 / rate).toFixed(1) : '∞';
  document.getElementById('rule72-text').textContent =
    `年利${rate}%なら約${dy}年で2倍`;

  // グラフ更新（万円単位で渡す）
  myChart.data.labels              = snaps.map(s => s.year + '年');
  myChart.data.datasets[0].data   = snaps.map(s => s.principal    / 1e4);
  myChart.data.datasets[1].data   = snaps.map(s => s.contribution / 1e4);
  myChart.data.datasets[2].data   = snaps.map(s => s.interest     / 1e4);
  myChart.update();
}

// ── シェア機能 ────────────────────────────────
function shareResult() {
  const P     = +document.getElementById('sl-principal').value;
  const M     = +document.getElementById('sl-monthly').value;
  const rate  = +document.getElementById('sl-rate').value;
  const years = +document.getElementById('sl-years').value;
  const snaps = calcSnapshots(P, M, rate, years);
  const last  = snaps[snaps.length - 1];
  const finalAsset    = last.principal + last.contribution + last.interest;
  const totalInvested = P + M * years * 12;
  const totalInterest = Math.max(0, finalAsset - totalInvested);
  const dy = rate > 0 ? (72 / rate).toFixed(1) : '∞';

  const text = `【複利シミュレーター結果】
初期元本: ${fmt(P)}
毎月積立: ${fmt(M)}
年利: ${rate}%
運用期間: ${years}年

▶ 最終資産: ${fmt(finalAsset)}
▶ 総投資額: ${fmt(totalInvested)}
▶ 利息合計: ${fmt(totalInterest)}

72の法則：年利${rate}%なら約${dy}年で2倍`;

  if (navigator.share) {
    navigator.share({ title: '複利シミュレーター', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('クリップボードにコピーしました'));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 初期描画 ──────────────────────────────────
onSlider();
</script>
</body>
</html>
